<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#1E3A8A"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>

  <!-- White road/speed arc -->
  <path d="M 30 130 Q 100 60 170 130" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="18" stroke-linecap="round"/>

  <!-- Lightning bolt centered -->
  <path d="M 115 35 L 75 105 L 100 105 L 85 165 L 130 90 L 103 90 Z"
        fill="url(#boltGrad)"/>

  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(252,211,77,0.25)" stroke-width="2"/>
</svg>
